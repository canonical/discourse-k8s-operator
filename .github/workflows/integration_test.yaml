name: Integration tests

on:
  pull_request:
  workflow_dispatch:
  schedule:
  - cron: "0 15 * * SAT"

jobs:
  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    permissions:
      contents: read
      packages: write
    secrets:
      CHARMHUB_TOKEN: ${{ secrets.CHARMHUB_TOKEN }}
      DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
      DISCOURSE_API_USERNAME: ${{ secrets.DISCOURSE_API_USERNAME }}
      JIRA_URL: ${{ secrets.JIRA_URL }}
      REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
      TEST_SAML_EMAIL: ${{ secrets.TEST_SAML_EMAIL }}
      TEST_SAML_PASSWORD: ${{ secrets.TEST_SAML_PASSWORD }}
    with:
      pre-run-script: s3-installation.sh
      trivy-image-config: "trivy.yaml"
      trivy-exit-code: 0
      juju-channel: 3.6/stable
      channel: 1.34-strict/stable
      modules: '["test_charm", "test_saml", "test_users", "test_db_migration"]'
      self-hosted-runner: true
      self-hosted-runner-label: "edge"
      with-uv: true
  allure-report:
    if: ${{ !cancelled() && github.event_name == 'schedule' }}
    needs:
    - integration-tests
    uses: canonical/operator-workflows/.github/workflows/allure_report.yaml@main
    permissions:
      contents: write
